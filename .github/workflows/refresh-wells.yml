name: Refresh oil well data

on:
  schedule:
    - cron: '0 19 1 * *'   # 11am PT on the 1st of each month
  workflow_dispatch:

concurrency:
  group: refresh-wells
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch oil wells from CalGEM
        run: |
          for attempt in 1 2 3; do
            node check-wells.mjs && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 60s..." && sleep 60
          done

      - name: Commit updated wells.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wells.json
          git diff --cached --quiet || git commit -m "chore: refresh oil well data [skip ci]"
          git pull --rebase
          git push
