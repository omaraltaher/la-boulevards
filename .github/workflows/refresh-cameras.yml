name: Refresh camera status

on:
  schedule:
    - cron: '0 14 * * *'   # 6am PT (UTC-8) every day
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check camera availability
        run: node check-cameras.mjs

      - name: Commit updated cameras-live.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cameras-live.json
          git diff --cached --quiet || git commit -m "chore: refresh camera status [skip ci]"
          git push
