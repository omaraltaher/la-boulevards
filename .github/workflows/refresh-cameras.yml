name: Refresh camera status

on:
  schedule:
    - cron: '0 14 * * *'   # 6am PT (UTC-8) every day
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

concurrency:
  group: refresh-cameras
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check camera availability
        run: |
          for attempt in 1 2 3; do
            node check-cameras.mjs && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 60s..." && sleep 60
          done

      - name: Commit updated cameras-live.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cameras-live.json
          git diff --cached --quiet || git commit -m "chore: refresh camera status [skip ci]"
          git pull --rebase
          git push
