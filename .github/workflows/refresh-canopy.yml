name: Refresh Canopy Data

on:
  schedule:
    - cron: '0 10 1 1 *'  # Jan 1st at 10am UTC (yearly — tree inventory is stable)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch StreetsLA tree inventory canopy data
        run: |
          for attempt in 1 2 3; do
            node check-canopy.mjs && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 60s..." && sleep 60
          done

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add canopy.json
          git diff --cached --quiet || git commit -m "chore: refresh canopy.json [skip ci]"
          git pull --rebase
          git push
