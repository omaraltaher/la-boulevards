name: Refresh Coyotes Data

on:
  schedule:
    - cron: '0 10 1 * *'   # 1st of each month at 10am UTC (2am PT)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch coyote observations
        run: node check-coyotes.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coyotes.json
          git diff --cached --quiet || git commit -m "chore: refresh coyotes.json [skip ci]"
          git pull --rebase
          git push
