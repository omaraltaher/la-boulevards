name: Refresh Lions Data

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of each month at 9am UTC (1am PT)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch mountain lion observations
        run: node check-lions.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lions.json
          git diff --cached --quiet || git commit -m "chore: refresh lions.json [skip ci]"
          git push
