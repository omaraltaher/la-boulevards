name: Refresh Lions Data

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of each month at 9am UTC (1am PT)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch mountain lion observations
        run: |
          for attempt in 1 2 3; do
            node check-lions.mjs && break
            [ $attempt -lt 3 ] && echo "Attempt $attempt failed, retrying in 60s..." && sleep 60
          done

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lions.json
          git diff --cached --quiet || git commit -m "chore: refresh lions.json [skip ci]"
          git pull --rebase
          git push
