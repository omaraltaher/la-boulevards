name: Refresh public art

on:
  schedule:
    - cron: '0 18 1 * *'   # 10am PT on the 1st of each month
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch public art from LA City Open Data
        run: node check-art.mjs

      - name: Commit updated art.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add art.json
          git diff --cached --quiet || git commit -m "chore: refresh public art [skip ci]"
          git push
