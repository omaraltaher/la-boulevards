name: Refresh Faults Data

on:
  schedule:
    - cron: '0 9 1 1 *'   # Jan 1st at 9am UTC (yearly — fault data rarely changes)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fault lines
        run: node check-faults.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add faults.json
          git diff --cached --quiet || git commit -m "chore: refresh faults.json [skip ci]"
          git pull --rebase
          git push
