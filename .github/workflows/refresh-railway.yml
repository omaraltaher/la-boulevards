name: Refresh Ghost Railway Data

on:
  schedule:
    - cron: '0 11 1 1 *'  # Jan 1st at 11am UTC (yearly — OSM railway data is stable)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ghost railway data
        run: node check-railway.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add railway.json
          git diff --cached --quiet || git commit -m "chore: refresh railway.json [skip ci]"
          git pull --rebase
          git push
