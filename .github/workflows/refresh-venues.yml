name: Refresh venue events

on:
  schedule:
    - cron: '0 16 * * *'   # 8am PT (UTC-8) every day
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

concurrency:
  group: refresh-venues
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch upcoming venue events
        run: node check-venues.mjs
        env:
          TICKETMASTER_KEY: ${{ secrets.TICKETMASTER_KEY }}

      - name: Commit updated venue-events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add venue-events.json
          git diff --cached --quiet || git commit -m "chore: refresh venue events [skip ci]"
          git pull --rebase
          git push
